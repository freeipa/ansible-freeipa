---
schedules:
- cron: "0 19 * * *"
  displayName: Nightly Builds
  branches:
    include:
    - master
  always: true

trigger: none

pool:
  vmImage: 'ubuntu-24.04'

stages:

# Fedora

- stage: FedoraLatest_Ansible_Core_2_13
  dependsOn: []
  jobs:
  - template: templates/group_tests.yml
    parameters:
      build_number: $(Build.BuildNumber)
      distro: fedora-latest
      ansible_version: "-core >=2.13,<2.14"
      filter_tests: false

- stage: FedoraLatest_Ansible_Core_2_14
  dependsOn: []
  jobs:
  - template: templates/group_tests.yml
    parameters:
      build_number: $(Build.BuildNumber)
      distro: fedora-latest
      ansible_version: "-core >=2.14,<2.15"
      filter_tests: false

- stage: FedoraLatest_Ansible_Core_2_15
  dependsOn: []
  jobs:
  - template: templates/group_tests.yml
    parameters:
      build_number: $(Build.BuildNumber)
      distro: fedora-latest
      ansible_version: "-core >=2.15,<2.16"
      filter_tests: false

- stage: FedoraLatest_Ansible_latest
  dependsOn: []
  jobs:
  - template: templates/group_tests.yml
    parameters:
      build_number: $(Build.BuildNumber)
      distro: fedora-latest
      ansible_version: ""
      filter_tests: false

# Galaxy on Fedora

- stage: Galaxy_FedoraLatest_Ansible_Core_2_13
  dependsOn: []
